<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <style>
        :root {
            color-scheme: dark;
            --text: #000000;
            --font-size: 17px;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            font-size: var(--font-size);
            line-height: 1.75;
            word-break: break-word;
        }

        #content {
            padding: 0;
        }

        p {
            margin: 0 0 18px 0;
        }

        h1,
        h2,
        h3 {
            margin: 28px 0 16px;
            line-height: 1.3;
            font-weight: 700;
        }

        p, li {
            font-size: 1em;
        }

        h1 {
            font-size: 1.8em;
        }

        h2 {
            font-size: 1.4em;
        }

        h3 {
            font-size: 1.2em;
        }

        code {
            font-size: 0.95em;
        }

        ul,
        ol {
            margin: 0 0 18px 0;
            padding-left: 1.4em;
        }

        li {
            margin: 6px 0;
        }

        strong {
            font-weight: 700;
        }

        code {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 6px;
            border-radius: 6px;
        }

        pre {
            overflow-x: auto;
            background: rgba(255, 255, 255, 0.08);
            padding: 14px;
            border-radius: 12px;
        }

        a {
            color: #7dd3fc;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div id="content"></div>

    <script>
        function escapeHTML(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }

        function parseInline(text) {
            let html = escapeHTML(text);

            html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
            html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
            html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
            html = html.replace(/\[(.*?)\]\((.*?)\)/g, "<a href=\"$2\">$1</a>");

            return html;
        }

        function renderMarkdown(markdown) {
            const lines = markdown.split(/\r?\n/);
            let html = "";
            let inUL = false;
            let inOL = false;
            let inCode = false;
            let codeBuffer = [];

            const closeLists = () => {
                if (inUL) {
                    html += "</ul>";
                    inUL = false;
                }
                if (inOL) {
                    html += "</ol>";
                    inOL = false;
                }
            };

            const flushCode = () => {
                if (codeBuffer.length > 0) {
                    html += "<pre><code>" + escapeHTML(codeBuffer.join("\\n")) + "</code></pre>";
                    codeBuffer = [];
                }
            };

            for (const rawLine of lines) {
                const line = rawLine.trim();

                if (line.startsWith("```")) {
                    closeLists();
                    if (inCode) {
                        flushCode();
                        inCode = false;
                    } else {
                        inCode = true;
                    }
                    continue;
                }

                if (inCode) {
                    codeBuffer.push(rawLine);
                    continue;
                }

                if (!line) {
                    closeLists();
                    continue;
                }

                if (line.startsWith("### ")) {
                    closeLists();
                    html += "<h3>" + parseInline(line.slice(4)) + "</h3>";
                    continue;
                }

                if (line.startsWith("## ")) {
                    closeLists();
                    html += "<h2>" + parseInline(line.slice(3)) + "</h2>";
                    continue;
                }

                if (line.startsWith("# ")) {
                    closeLists();
                    html += "<h1>" + parseInline(line.slice(2)) + "</h1>";
                    continue;
                }

                if (/^(\d+)\.\s+/.test(line)) {
                    if (!inOL) {
                        closeLists()
                        html += "<ol>"
                        inOL = true
                    }
                    html += "<li>" + parseInline(line.replace(/^\d+\.\s+/, "")) + "</li>"
                    continue
                }

                if (/^[-*]\s+/.test(line)) {
                    if (!inUL) {
                        closeLists()
                        html += "<ul>"
                        inUL = true
                    }
                    html += "<li>" + parseInline(line.replace(/^[-*]\s+/, "")) + "</li>"
                    continue
                }
                closeLists();
                html += "<p>" + parseInline(line) + "</p>";
            }

            closeLists();
            flushCode();

            const content = document.getElementById("content");
            content.innerHTML = html;

            setTimeout(reportHeight, 0);
        }

        function reportHeight() {
            const height = document.documentElement.scrollHeight || document.body.scrollHeight;
            window.webkit.messageHandlers.contentHeight.postMessage(height);
        }

        function setTextStyle(color, size) {
            document.documentElement.style.setProperty('--text', color);
            document.documentElement.style.setProperty('--font-size', size + 'px');
        }
        
        window.renderMarkdown = renderMarkdown;
        window.addEventListener("load", reportHeight);
    </script>
</body>

</html>
