<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div id="content"></div>

    <script>
        function escapeHTML(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }

        function parseInline(text) {
            let html = escapeHTML(text);

            html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
            html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
            html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
            html = html.replace(/\[(.*?)\]\((.*?)\)/g, "<a href=\"$2\">$1</a>");

            return html;
        }

        function renderMarkdown(markdown) {
            const lines = markdown.split(/\r?\n/);
            let html = "";
            let inUL = false;
            let inOL = false;
            let inCode = false;
            let codeBuffer = [];

            const closeLists = () => {
                if (inUL) {
                    html += "</ul>";
                    inUL = false;
                }
                if (inOL) {
                    html += "</ol>";
                    inOL = false;
                }
            };

            const flushCode = () => {
                if (codeBuffer.length > 0) {
                    html += "<pre><code>" + escapeHTML(codeBuffer.join("\\n")) + "</code></pre>";
                    codeBuffer = [];
                }
            };

            for (const rawLine of lines) {
                const line = rawLine.trim();

                if (line.startsWith("```")) {
                    closeLists();
                    if (inCode) {
                        flushCode();
                        inCode = false;
                    } else {
                        inCode = true;
                    }
                    continue;
                }

                if (inCode) {
                    codeBuffer.push(rawLine);
                    continue;
                }

                if (!line) {
                    closeLists();
                    continue;
                }
        
                if (line.startsWith("##### ")) {
                    closeLists();
                    html += "<h5>" + parseInline(line.slice(6)) + "</h5>";
                    continue;
                }
                
                if (line.startsWith("#### ")) {
                    closeLists();
                    html += "<h4>" + parseInline(line.slice(5)) + "</h4>";
                    continue;
                }

                if (line.startsWith("### ")) {
                    closeLists();
                    html += "<h3>" + parseInline(line.slice(4)) + "</h3>";
                    continue;
                }

                if (line.startsWith("## ")) {
                    closeLists();
                    html += "<h2>" + parseInline(line.slice(3)) + "</h2>";
                    continue;
                }

                if (line.startsWith("# ")) {
                    closeLists();
                    html += "<h1>" + parseInline(line.slice(2)) + "</h1>";
                    continue;
                }

                if (/^(\d+)\.\s+/.test(line)) {
                    if (!inOL) {
                        closeLists()
                        html += "<ol>"
                        inOL = true
                    }
                    html += "<li>" + parseInline(line.replace(/^\d+\.\s+/, "")) + "</li>"
                    continue
                }

                if (/^[-*]\s+/.test(line)) {
                    if (!inUL) {
                        closeLists()
                        html += "<ul>"
                        inUL = true
                    }
                    html += "<li>" + parseInline(line.replace(/^[-*]\s+/, "")) + "</li>"
                    continue
                }
                closeLists();
                html += "<p>" + parseInline(line) + "</p>";
            }

            closeLists();
            flushCode();

            const content = document.getElementById("content");
            content.innerHTML = html;

            setTimeout(reportHeight, 0);
        }

        function reportHeight() {
            const height = document.documentElement.scrollHeight || document.body.scrollHeight;
            window.webkit.messageHandlers.contentHeight.postMessage(height);
        }

        function setTextStyle(color, size) {
            document.documentElement.style.setProperty('--text', color);
            document.documentElement.style.setProperty('--font-size', size + 'px');
        }
        
        function getTextContent() {
            const content = document.getElementById("content");
            return content ? content.innerText : "";
        }
        
        function getHtmlContent() {
            const content = document.getElementById("content");
            return content ? content.innerHTML : "";
        }
        
        window.renderMarkdown = renderMarkdown;
        window.addEventListener("load", reportHeight);
    </script>
</body>

</html>
